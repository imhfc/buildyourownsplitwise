# 決策記錄索引
# 版本: 2.0 (2026-03-30) - 適配 Build Your Own Splitewise 專案
#
# 記錄非正式但重要的技術決策
# ============================================================

decisions:
  - id: DEC-001
    date: 2026-03-28
    context: "需要選擇後端框架和 ORM 以支援非同步操作和高效能"
    decision: |
      1. 後端使用 FastAPI + SQLAlchemy 2.0 (async)
      2. 資料庫驅動使用 asyncpg（非同步 PostgreSQL）
      3. 所有 API 端點和資料庫操作使用 async/await
    rationale: "FastAPI 原生支援 async，SQLAlchemy 2.0 提供成熟的 async ORM，asyncpg 是最快的 PostgreSQL async 驅動"
    status: active

  - id: DEC-002
    date: 2026-03-28
    context: "分帳計算需要精確的小數處理"
    decision: |
      1. 所有金額欄位使用 Decimal(12,2)，禁止 float
      2. 四捨五入的差異歸付款人承擔
      3. 結算演算法使用淨餘額圖 + 貪婪 max-heap 最小化交易次數
    rationale: "浮點數會產生精度問題（如 0.1 + 0.2 != 0.3），Decimal 保證精確計算"
    status: active

  - id: DEC-003
    date: 2026-03-28
    context: "前端需要支援多平台和快速開發"
    decision: |
      1. 使用 Expo + React Native 支援 iOS/Android/Web
      2. 樣式使用 NativeWind (Tailwind CSS for RN)
      3. 全域狀態使用 Zustand（輕量、TypeScript 友善）
      4. 多語系使用 i18next（zh-TW 為預設語言）
    rationale: "Expo 降低原生開發門檻，NativeWind 統一樣式語法，Zustand 比 Redux 簡潔"
    status: active

  - id: DEC-004
    date: 2026-03-31
    context: "需要匯率轉換支援多幣別分帳，原方案依賴 Redis 快取但本機開發環境無 Redis，導致 TCP hang 累積逾時"
    decision: |
      1. 匯率來源：台灣銀行 API (tw.rter.info)
      2. 移除 Redis 依賴，改用背景排程每 30 分鐘抓匯率存 DB
      3. Service 層只從 DB 讀取匯率，禁止在請求路徑中呼叫外部 API
      4. 新增 /exchange-rates/last-updated 端點供前端顯示更新時間
    rationale: "Redis 在本機開發環境不存在導致前端 timeout；外部 API 延遲不可控，背景排程 + DB 查詢保證毫秒級回應"
    status: active

  - id: DEC-005
    date: 2026-03-30
    context: "導入 fine-tune-ai-agent 框架提升 AI 輔助開發效能"
    decision: |
      1. 安裝 fine-tune-ai-agent 框架（Atomic Agents + Skills + Hooks）
      2. 所有 rules/hooks/skills 從 Java/Gradle 改寫為 Python/Expo
      3. 透過 settings.json 註冊 hooks 自動觸發
    rationale: "框架提供結構化的 AI 開發輔助（代碼審查、測試撰寫、安全檢查），但原版為 Java 專案設計，需全面適配"
    status: active

  - id: DEC-006
    date: 2026-03-30
    context: |
      前端 Modal 表單的 catch 區塊使用 Alert.alert 顯示 API 錯誤，
      導致 Expo Web 上使用者完全看不到錯誤訊息，誤判功能壞掉。
      curl 確認後端正常，問題在前端錯誤回饋機制。
    decision: |
      放棄 Alert.alert 作為 Modal 表單錯誤回饋機制，
      統一改用 inline error state 搭配 Modal 內 Text 元件顯示：
      1. 宣告 const [formError, setFormError] = useState<string | null>(null)
      2. catch 區塊執行 setFormError(t("unknown_error"))
      3. Modal 內渲染 {formError && <Text className="text-destructive">{formError}</Text>}
      4. 操作成功或 Modal 關閉時 setFormError(null)
    rationale: |
      Alert.alert 在 Expo Web 上行為不穩定，不帶 buttons 時雖理論上等同
      window.alert，但實際上錯誤訊息可能無聲消失。
      Inline error 在操作情境中直接顯示，對 web 和 native 都穩定有效。
    impact: "所有含 API 呼叫的 Modal 表單元件需同步審查並修改"
    status: active

  - id: DEC-009
    date: 2026-04-03
    context: |
      測試 DB 原本在 VM (211.20.120.114) 上的 db-test Docker 容器，
      本機透過 autossh SSH tunnel (port 5433) 連線。依賴 VM 狀態和網路連線，
      開發體驗不穩定。
    decision: |
      1. 測試 DB 改為本機 PostgreSQL 16（brew install postgresql@16，port 5432）
      2. 刪除 VM 上的 db-test 容器
      3. 移除本機 autossh SSH tunnel（launchd plist）
      4. 刪除 docker-compose.test.yml，移除 docker-compose.yml 中的 db-test service
      5. 更新所有引用（13 個檔案：rules, agents, hooks, memory-bank, docs）
    rationale: "本機 DB 延遲更低、不依賴 VM 狀態和 SSH tunnel，開發體驗更好；prod VM 不應有測試用容器"
    status: active

  - id: DEC-007
    date: 2026-03-31
    context: |
      原本的「開發完必測試」過於粗糙，無法區分代碼審查、撰寫新測試、回歸測試三種不同目的的品質保障手段。
      使用者要求將開發完成後的品質流程拆分為明確的三個步驟。
    decision: |
      開發完成後的強制品質流程拆分為三步：
      1. 觸發 /review-code 進行代碼審查（安全、架構、效能）
      2. 新功能觸發 /write-tests 撰寫對應測試案例並執行
      3. 所有改動（含 bug 修復、重構）必須跑完整回歸測試套件
    rationale: |
      審查、新測試、回歸測試各有不同目的：
      - 審查：發現設計問題、安全漏洞
      - 新測試：確保新功能有覆蓋
      - 回歸測試：確保舊功能未被破壞
      混在一起容易遺漏其中一環。
    status: active

  - id: DEC-008
    date: 2026-03-31
    context: |
      前端群組頁面 AxiosError timeout（10s），根因是 settlement_service.calculate_balances
      呼叫 exchange_rate_service.get_rate，後者嘗試連 Redis（本機無 Redis → TCP hang）
      和 fallback 打台銀 API（httpx 10s timeout），累積延遲超過前端 timeout。
    decision: |
      1. 移除 Redis 依賴，exchange_rate_service 不再引用 redis module
      2. get_rate() 只查 DB（direct → reverse → cross-rate via TWD）
      3. 新增 background_refresh_loop() 背景排程，app startup 時啟動
      4. 排程間隔 30 分鐘，首次啟動立即執行
    rationale: |
      Service 層在請求路徑中依賴外部基礎設施（Redis、外部 API）是反模式。
      背景預取 + DB 查詢將匯率查詢延遲從秒級降到毫秒級。
    status: active
