################################################################################
# Magnolia 批次安裝配置檔
#
# 此配置檔供以下腳本使用：
#   - install.sh 和 bootstrap.sh (批次安裝)
#   - tools/fetch-profile.sh (拉取本地開發配置)
#
# ┌─────────────────────┬──────────────────────────────────────────────────────┐
# │ 配置項目            │ 說明                                                  │
# ├─────────────────────┼──────────────────────────────────────────────────────┤
# │ BASE_DIR            │ 基礎搜索目錄（專案所在的父目錄）                       │
# │ EXCLUDE_KEYWORDS    │ 系統預設排除（本檔案專屬，必須存在）                   │
# │ EXCLUDE_FOLDER      │ 自訂排除目錄（逗號分隔，支援通配符，可為空）           │
# │ PROFILE_REPO        │ navi-profile 遠端 Git 倉庫                            │
# │ PROFILE_BRANCH      │ navi-profile 分支名稱                                 │
# │ PROFILE_CACHE_DIR   │ navi-profile 本地快取目錄                             │
# │ DEFAULT_VERSION     │ 無法從分支偵測版本時的預設值                          │
# └─────────────────────┴──────────────────────────────────────────────────────┘
#
# 格式: 目錄匹配模式:MODULE_NAME
#
# MODULE_NAME 對應 navi-profile 中的專案目錄結構：
#   navi-profile/{PROJECT_NAME}/{VERSION}/services/{SERVICE_SUBDIR}/src/main/resources/
#     - application-local.yaml
#     - application-ibm.yaml
#     - clientTruststore.p12
#
# ┌────────────┬────────────────┬─────────────────────────────────────┐
# │ 代號       │ 說明           │ 匹配模式                             │
# ├────────────┼────────────────┼─────────────────────────────────────┤
# │ AGREEMENT  │ 客戶協議管理   │ *customer-agreement-mgmt            │
# │ user-mgmt   │ 客戶資訊管理   │ *user-management           │
# │ order-mgmt    │ 客戶關係管理   │ *order-management            │
# │ event-mgmt    │ 事件管理       │ *event-management                   │
# │ profile-mgmt     │ 個人資料管理   │ *profile-management                 │
# │ sales-mgmt   │ 銷售管理       │ *sales-management                   │
# └────────────┴────────────────┴─────────────────────────────────────┘
#
# 版本由 checkout 的分支決定 (例: dev/v2.0_DEV → v2.0)
#
################################################################################

#===============================================================================
# 路徑設定
#===============================================================================

BASE_DIR=/Users/Shared/Work/Projects

#===============================================================================
# 排除設定
#===============================================================================

EXCLUDE_KEYWORDS=IBM*,navi-profile

EXCLUDE_FOLDER=

#===============================================================================
# navi-profile 設定 (統一資源來源)
#===============================================================================

PROFILE_REPO=git@github.ibm.com:ctbc-navi/navi-profile.git

PROFILE_BRANCH=main

PROFILE_CACHE_DIR=$HOME/.cache/navi-profile

DEFAULT_VERSION=v1.0

#===============================================================================
# 模組對應表
# 格式: 目錄匹配模式:MODULE_NAME:SERVICE_SUBDIR
# SERVICE_SUBDIR 為目標專案內的 services/ 子目錄名稱
#===============================================================================

*customer-agreement-mgmt:AGREEMENT:customer-agreement-mgmt
*user-management:user-mgmt:user-management
*order-management:order-mgmt:order-management
*event-management:event-mgmt:event-management
*profile-management:profile-mgmt:profile-management
*sales-management:sales-mgmt:sales-management
