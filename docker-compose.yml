name: buildyourownsplitwise

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: splitewise
      POSTGRES_PASSWORD: splitewise
      POSTGRES_DB: splitewise
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: splitewise
      POSTGRES_PASSWORD: splitewise
      POSTGRES_DB: splitewise_test
    ports:
      - "127.0.0.1:${DB_TEST_PORT:-5433}:5432"
    tmpfs:
      - /var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://splitewise:splitewise@db:5432/splitewise}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  caddy:
    build:
      context: ./mobile
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${GOOGLE_CLIENT_IDS:-}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
